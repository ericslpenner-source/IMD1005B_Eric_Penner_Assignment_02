<!DOCTYPE html>
<html lang="en-ca">
    <head>
            <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <header>
            <nav id="mainNavbar">
                    <img src="instagram-1349676_1280.webp">
                    <a class="navLink" href="index.html">
                        Photography
                    </a>
                    <div id="emptyNav">
                        <!-- empty div to create space -->
                    </div>
                    <div class="rightNav navAppear">
                        <p id="hamburger">
                            ☰
                        </p>
                    </div>
                    <div id="storyDiv" class="rightNav navDisappear">
                        <a class="navLink" id="story" href="our-story.html">
                            Our Story
                        </a>
                    </div>
                    <div id="contactDiv" class="rightNav navDisappear">
                        <a id="contact" href="contact.html">
                            CONTACT & RATES
                        </a>
                    </div>
                </nav>
        </header>
        <section id="rates">
            <h1>
                 Rates
            </h1>
            <table id="ratesTable">
                <script src='ratesTable.js'></script>
            </table>
        </section>
        <section id="contactFormSection">
            <h1>
                Contact
            </h1>
            <form name="contactForm" action="" method="get">
                <label for="firstName">First Name</label><br>
                <input type="text" id="firstName" name="firstName" placeholder="..."><br>
                <label for="lastName">Last Name</label><br>
                <input type="text" id="lastName" name="lastName" placeholder="..."><br>
                <label for="userEmail">Email address</label><br>
                <input type="email" id="userEmail" name="userEmail" placeholder="..."><br>
                <label for="message">Message</label><br>
                <textarea id="message" name="message" rows="10" cols="60"></textarea><br><br>
                <button type="submit" id="submitButton" onclick="validateForm()">Submit</button>
                </form>
            </section>
            <div class="centerContainer">
                <button onclick="goToTop()" id="topButton" title="go to top">
                    to top
                </button>
            </div>
            <footer>
                <img src="footer.png">
            </footer>
            <script src='main.js'></script>
        </body>
    </main>
</html>
